name: Daily Navishti Food Menu

on:
  schedule:
    # 15:30 Asia/Kolkata.
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-navishti-menu-publish
  cancel-in-progress: false

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Generate and verify next-day Navishti menu (IST)
        run: |
          for attempt in 1 2; do
            if ./scripts/generate-navishti-menu.sh; then
              exit 0
            fi
            if [ "${attempt}" -eq 1 ]; then
              echo "First Navishti menu generation attempt failed; retrying immediately."
            fi
          done
          exit 1

      - name: Commit Navishti output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add navishti_daily_menu.txt daily_menu.txt history.json published_menu_archive.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update Navishti menu"
          git push || {
            echo "Initial push failed; rebasing and retrying immediately."
            git pull --rebase origin main
            git push
          }
