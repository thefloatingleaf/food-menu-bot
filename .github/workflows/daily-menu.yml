name: Daily Food Menu

on:
  schedule:
    # 13:30 Asia/Kolkata.
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-food-menu-publish
  cancel-in-progress: false

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Generate and verify next-day menu (IST)
        run: |
          for attempt in 1 2; do
            if ./scripts/generate-daily-menu.sh; then
              exit 0
            fi
            if [ "${attempt}" -eq 1 ]; then
              echo "First normal menu generation attempt failed; retrying immediately."
            fi
          done
          exit 1

      - name: Commit daily output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add daily_menu.txt history.json published_menu_archive.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update daily menu"
          git push || {
            echo "Initial push failed; rebasing and retrying immediately."
            git pull --rebase origin main
            git push
          }
