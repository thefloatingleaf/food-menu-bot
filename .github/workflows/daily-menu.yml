name: Daily Food Menu

on:
  schedule:
    # Publish from morning through mid-afternoon IST so the repo self-heals
    # if GitHub skips or delays any one scheduled window.
    # 07:30, 09:30, 11:30, 13:30, 14:30 Asia/Kolkata
    # The iPhone Shortcut sends at 15:10 Asia/Kolkata, so every safety window
    # must still land before that send time.
    - cron: "0 2,4,6,8,9 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/daily-menu.yml"
      - "generate_menu.py"
      - "config.json"
      - "breakfast_*.json"
      - "menu_*.json"
      - "ekadashi_*.json"
      - "panchang_*.json"
      - "festivals_*.json"
      - "fruit_months.json"
      - "manual_weather_override.json"
      - "menu_weather_tags.json"
      - "lunar_calendar_*.json"
      - "heavy_light_classification_food_items_revised_paratha_rule.csv"
      - "scripts/generate-daily-menu.sh"
      - "scripts/verify_daily_menu_freshness.py"

permissions:
  contents: write

concurrency:
  group: daily-food-menu-publish
  cancel-in-progress: false

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Generate and verify next-day menu (IST)
        run: |
          ./scripts/generate-daily-menu.sh

      - name: Commit daily output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add daily_menu.txt history.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update daily menu"
          git push
